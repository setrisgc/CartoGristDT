<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>CartoGrist IGN</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css">


<style>

html, body {
    margin:0;
    padding:0;
    height:100%;
}


#map {
    width:100%;
    height:100%;
}


.leaflet-popup-content {
    font-size:14px;
    line-height:1.4;
}

</style>

</head>


<body>


<div id="map"></div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- API Grist -->
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>


<script>


// ======================================
// INITIALISATION CARTE
// ======================================


const map = L.map('map');


// Vue initiale Manche

map.setView(
    [49.1, -1.3],
    9
);



// ======================================
// FOND IGN CLASSIQUE
// ======================================


// Version provisoire.
// On remplacera ensuite par le flux Plan IGN officiel.

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    maxZoom:19,
    attribution:"© CartoGrist"
}
)
.addTo(map);



// ======================================
// COUCHES
// ======================================


const coucheCommunes = L.layerGroup().addTo(map);

const coucheDT = L.layerGroup().addTo(map);

const coucheProjets = L.layerGroup().addTo(map);



// ======================================
// STYLE AVIS
// ======================================


function couleurAvis(Avis){


    if(!Avis){
        return "#808080";
    }


    Avis = Avis.toLowerCase();


    if(Avis.includes("favorable")){
        return "#2E8B57";
    }


    if(Avis.includes("défavorable")){
        return "#D93025";
    }


    return "#F4B400";

}




// ======================================
// CHARGEMENT DES GEOJSON
// ======================================



// A remplacer par tes futures URL

const urlDT = "limites_DT.geojson";
const urlCommunes = "communes.geojson";





// DT

fetch(urlDT)
.then(response => {
    console.log("Réponse GeoJSON DT :", response.status);
    return response.json();
})
.then(data => {

    console.log("GeoJSON DT chargé :", data);

    L.geoJSON(
        data,
        {

            style:{
                color:"#333",
                weight:3,
                fillOpacity:0
            },


            onEachFeature:function(feature,layer){

                if(feature.properties.NOM){

                    layer.bindPopup(
                    "<b>DT :</b> "
                    + feature.properties.NOM
                    );

                }

            }

        }

    )
    .addTo(coucheDT);


});





// Communes


fetch(urlCommunes)

.then(response => response.json())

.then(data => {


    L.geoJSON(
        data,
        {

            style:{
                color:"#999",
                weight:1,
                fillOpacity:0
            },


            onEachFeature:function(feature,layer){

                if(feature.properties.NOM_COMM){

                    layer.bindTooltip(
                    feature.properties.NOM_COMM
                    );

                }

            }

        }

    )
    .addTo(coucheCommunes);


});






// ======================================
// CONNEXION GRIST
// ======================================



grist.ready({

    requiredAccess:'read table'

});





grist.onRecords(function(records){


 console.log(records[0]);
console.log("Clés :", Object.keys(records[0]));
    coucheProjets.clearLayers();



    let bounds=[];



    records.forEach(row=>{



        if(
            row.Latitude &&
            row.Longitude
        ){



            let lat=parseFloat(row.Latitude);

            let lon=parseFloat(row.Longitude);



            if(
                !isNaN(lat)
                &&
                !isNaN(lon)
            ){



                let point=L.circleMarker(

                    [lat,lon],

                    {

                        radius:9,

                        color:"#ffffff",

                        weight:2,


                        fillColor:
                        couleurAvis(row.Avis),


                        fillOpacity:0.9

                    }

                );





                point.bindPopup(`


                <b>Dossier :</b>
                ${row["Numero_de_dossier"] || ""}

                <br><br>


                <b>Commune :</b>
                ${row.Commune || ""}

                <br>


                <b>DT :</b>
                ${row.DT || ""}

                <br><br>


                <b>Projet :</b>
                ${row["Type_projet"] || ""}

                <br>


                <b>Porteur :</b>
                ${row["Nom_porteur_de_projet"] || ""}

                <br>


                <b>Date dépôt :</b>
                ${row["Date_du_depot"] || ""}

                <br><br>


                <b>Avis :</b>
                ${row.Avis || ""}



                `);



                point.addTo(coucheProjets);


                bounds.push([lat,lon]);

            }


        }



    });




    // zoom automatique

    if(bounds.length>0){

        map.fitBounds(bounds);

    }



});




</script>


</body>

</html>
