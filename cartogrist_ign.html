<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<title>CartoGrist IGN</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css">


<style>

html, body {
    margin:0;
    padding:0;
    height:100%;
}


#map {
    width:100%;
    height:100%;
}


.leaflet-popup-content {
    font-size:14px;
    line-height:1.4;
}

.legend {
    background:white;
    padding:12px;
    border-radius:8px;
    box-shadow:0 0 12px rgba(0,0,0,0.3);
    font-size:14px;
    line-height:1.8;
}

.legend h4 {
    margin:0 0 8px 0;
    font-size:15px;
}

.legend .circle {
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:6px;
}

.legend .line-dt {
    display:inline-block;
    width:22px;
    border-top:3px solid #333;
    margin-right:6px;
}

.legend .line-com {
    display:inline-block;
    width:22px;
    border-top:1px solid #999;
    margin-right:6px;
}

</style>

</head>


<body>


<div id="map"></div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- API Grist -->
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>


<script>


// ======================================
// INITIALISATION CARTE
// ======================================


const map = L.map('map');


// ======================================
// ORDRE DES COUCHES
// ======================================

map.createPane('communesPane');
map.getPane('communesPane').style.zIndex = 350;

map.createPane('epciPane');
map.getPane('epciPane').style.zIndex = 400;

map.createPane('dtPane');
map.getPane('dtPane').style.zIndex = 450;

map.createPane('projetsPane');
map.getPane('projetsPane').style.zIndex = 500;

    
// ======================================
// FOND IGN CLASSIQUE
// ======================================


// Version provisoire.
// On remplacera ensuite par le flux Plan IGN officiel.

const fond = L.tileLayer(
    'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        maxZoom:19,
        opacity:0.7,
        attribution:"© CartoGrist"
    }
);

const recherche = L.control({position:'topleft'});

recherche.onAdd = function(){

    const div = L.DomUtil.create('div','legend');

    div.innerHTML = `
        <input
            id="rechercheCommune"
            type="text"
            placeholder="Rechercher une commune..."
            style="width:180px;padding:5px;">
    `;

    return div;
};

recherche.addTo(map);



fond.addTo(map);


// ======================================
// COUCHES
// ======================================





const coucheProjets = L.layerGroup().addTo(map);

    const coucheDT = L.layerGroup().addTo(map);

const couchecommunes = L.layerGroup();
    
const coucheEPCI = L.layerGroup();



// ======================================
// CONTROLE DES COUCHES
// ======================================

const fonds = {};

const overlays = {

    "🟢 Projets": coucheProjets,

     '<span style="color:#494949">▬</span> Limites des DT': coucheDT,

     '<span style="color:#9a009b">▬</span> Limites des EPCI': coucheEPCI,

	'<span style="color:#b6b6b6">▬</span> Limites des communes': couchecommunes

};


L.control.layers(
    fonds,
    overlays,
    {
        collapsed:false
    }
)
.addTo(map);





// ======================================
// LEGENDE CARTOGRIST
// ======================================

const legend = L.control({
    position:'bottomright'
});


legend.onAdd = function(){

    const div = L.DomUtil.create(
        'div',
        'legend'
    );


    div.innerHTML = `

    <h4>CartoGrist DT</h4>


    <span class="circle"
    style="background:#2E8B57">
    </span>
    Favorable
    <br>


    <span class="circle"
    style="background:#F4B400">
    </span>
    En cours
    <br>


    <span class="circle"
    style="background:#D93025">
    </span>
    Défavorable
    <br>


    <span class="circle"
    style="background:#808080">
    </span>
    Sans avis

    <hr>



    `;


    return div;

};


legend.addTo(map);

const controleOpacity = L.control({position:'topright'});

controleOpacity.onAdd = function(){

    const div = L.DomUtil.create('div','legend');

    div.innerHTML = `
        <b>Fond de carte</b><br>
        <input id="opacitySlider"
               type="range"
               min="0"
               max="100"
               value="70">
    `;

    return div;
};

controleOpacity.addTo(map);

setTimeout(function(){

    document.getElementById("opacitySlider")
        .addEventListener("input", function(){

            fond.setOpacity(this.value/100);

        });

},500);






// ======================================
// STYLE AVIS
// ======================================


function couleurAvis(Avis){

    if(!Avis){
        return "#808080";
    }


    Avis = Avis
        .toString()
        .trim()
        .toLowerCase();


    if(Avis === "défavorable"){
        return "#D93025";
    }


    if(Avis === "favorable"){
        return "#2E8B57";
    }


    if(Avis === "en cours"){
        return "#F4B400";
    }


    return "#808080";

}


// ======================================
// CHARGEMENT DES GEOJSON
// ======================================



// A remplacer par tes futures URL

const urlDT = "limites_DT.geojson";
const urlEPCI = "limites_epci.geojson";
const urlCommunes = "communes.geojson";





// DT

fetch(urlDT)
.then(response => {
    console.log("Réponse GeoJSON DT :", response.status);
    return response.json();
})
.then(data => {

    console.log("GeoJSON DT chargé :", data);

    L.geoJSON(
        data,
        {

              pane:'dtPane',

            style:{
                color:"#494949",
                weight:3,
                fillOpacity:0
            }

        }

    )
    .addTo(coucheDT);


});





// EPCI


fetch(urlEPCI)

.then(response => response.json())

.then(data => {


    L.geoJSON(
        data,
        {

              pane:'epciPane',
            style:{
                color:"#9a009b",
                weight:2,
                fillOpacity:0
            }

        }

    )
    .addTo(coucheEPCI);


});


// communes

let coucheGeoCommunes;

fetch(urlCommunes)

.then(response => response.json())

.then(data => {

    coucheGeoCommunes = L.geoJSON(
        data,
        {
            pane:'communesPane',
            style:{
                color:"#b6b6b6",
                weight:1,
                fillOpacity:0
            }
        }

    ).addTo(couchecommunes);

});


// =========================
// RECHERCHE COMMUNE
// =========================

setTimeout(function(){

    document
        .getElementById("rechercheCommune")
        .addEventListener("keyup",function(){

            let recherche = this.value.toLowerCase();

            coucheGeoCommunes.eachLayer(function(layer){

                let nom = layer.feature.properties.NOM_COMM.toLowerCase();

                if(nom.includes(recherche) && recherche!=""){

                    map.fitBounds(layer.getBounds());

                    layer.setStyle({
                        color:"#ff0000",
                        weight:4
                    });

                }else{

                    layer.setStyle({
                        color:"#b6b6b6",
                        weight:1
                    });

                }

            });

        });

},500);





// ======================================
// CONNEXION GRIST
// ======================================



grist.ready({

    requiredAccess:'read table'

});





grist.onRecords(function(records){

records.forEach(record => {

    console.log(
        "Coordonnées :",
        record.Longitude,
        record.Latitude2
    );

});


console.log("Nombre de lignes reçues :", records.length);
console.log("Première ligne Grist :", records[0]);

 console.log(records[0]);
console.log("Clés :", Object.keys(records[0]));
    coucheProjets.clearLayers();



    let bounds=[];



    records.forEach(row=>{



        if(
            row.Latitude2 &&
            row.Longitude
        ){



            let lat=parseFloat(row.Latitude2);

            let lon=parseFloat(row.Longitude);



            if(
                !isNaN(lat)
                &&
                !isNaN(lon)
            ){



                let point=L.circleMarker(

                    [lat,lon],

                    {
                          pane:'projetsPane',

                        radius:9,

                        color:"#ffffff",

                        weight:2,


                        fillColor:
                        couleurAvis(row.Avis),


                        fillOpacity:0.9

                    }

                );





                point.bindPopup(`


                <b>Dossier :</b>
                ${row["Numero_de_dossier"] || ""}

                <br><br>


                <b>Commune :</b>
                ${row.Commune || ""}

                <br>


                <b>DT :</b>
                ${row.DT || ""}

                <br><br>


                <b>Projet :</b>
                ${row["Type_projet"] || ""}

                <br>


                <b>Porteur :</b>
                ${row["Nom_porteur_de_projet"] || ""}

                <br>


                <b>Date dépôt :</b>
                ${row["Date_du_depot"] || ""}

                <br><br>


                <b>Avis :</b>
                ${row.Avis || ""}



                `);



                point.addTo(coucheProjets);


                bounds.push([lat,lon]);

            }


        }



    });




    // zoom automatique

    if(bounds.length>0){

        map.fitBounds(bounds);

    }



});




</script>


</body>

</html>
